<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBillBook - Home</title>
    <!-- Bootstrap CSS -->
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="bg-primary text-white text-center py-4 mb-4">
        <h1>MyBillBook</h1>
    </header>
    <div class="container">
        <div class="row">
            <div class="col-md-4 mb-4">
                <div class="card text-center shadow border-0 animate-fade">
                    <div class="card-body">
                        <i class="fas fa-file-invoice-dollar fa-3x mb-3"></i>
                        <h5 class="card-title">Create Invoice</h5>
                        <p class="card-text">Easy creation of invoices with customizable templates.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card text-center shadow border-0 animate-slide">
                    <div class="card-body">
                        <i class="fas fa-chart-line fa-3x mb-3"></i>
                        <h5 class="card-title">Analytics</h5>
                        <p class="card-text">Powerful insights with real-time analytics.</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-4">
                <div class="card text-center shadow border-0 animate-zoom">
                    <div class="card-body">
                        <i class="fas fa-user-shield fa-3x mb-3"></i>
                        <h5 class="card-title">Secure Accounts</h5>
                        <p class="card-text">Safety and security of your financial data.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
